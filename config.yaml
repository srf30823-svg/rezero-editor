  music_dir: /data/data/com.termux/files/home/storage/shared/Download/rezero/input/music
  output_dir: /data/data/com.termux/files/home/storage/shared/Download/rezero/output/shorts
  timeline_dir: /data/data/com.termux/files/home/storage/shared/Download/rezero/output/timelines

output:
